name: Deploy PR30 temporary preview

# Temporary combined Pages deploy:
# - production root = exact main Feed V1
# - /pr30-preview/ = PR #30 Feed V1.1
# Does not merge PR #30 and does not modify main application code.
on:
  push:
    branches:
      - infrastructure/pr30-pages-preview
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Flutter
        run: |
          git clone --depth 1 --branch 3.44.6 https://github.com/flutter/flutter.git "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Verify Flutter
        run: |
          flutter --version
          flutter config --no-analytics
          flutter precache --web

      - name: Checkout production main
        uses: actions/checkout@v4
        with:
          ref: 99fec708c05c978948e4a1894caf7c2ef0135296
          path: prod

      - name: Build production root
        working-directory: prod
        run: |
          flutter pub get
          # pwa-strategy=none avoids a root service worker whose scope would
          # cover /pr30-preview/ and risk cross-contaminating caches.
          flutter build web --release --base-href /town-safe-space-mobile/ --pwa-strategy=none

      - name: Checkout PR #30
        uses: actions/checkout@v4
        with:
          ref: 43f4bc17b71c377d09afd4cf01fcdc5ff923ecbd
          path: pr30

      - name: Build PR #30 preview subdirectory
        working-directory: pr30
        run: |
          flutter pub get
          flutter build web --release --base-href /town-safe-space-mobile/pr30-preview/ --pwa-strategy=none

      - name: Assemble combined Pages artifact
        run: |
          mkdir -p site
          cp -a prod/build/web/. site/
          mkdir -p site/pr30-preview
          cp -a pr30/build/web/. site/pr30-preview/
          # Prove isolation: preview must not share production main.dart.js path.
          test -f site/main.dart.js
          test -f site/pr30-preview/main.dart.js
          test -f site/index.html
          test -f site/pr30-preview/index.html
          # Preview base href must be nested.
          grep -q 'href="/town-safe-space-mobile/pr30-preview/"' site/pr30-preview/index.html
          grep -q 'href="/town-safe-space-mobile/"' site/index.html
          # No production flutter_service_worker that could blanket-cache the tree.
          test ! -f site/flutter_service_worker.js
          test ! -f site/pr30-preview/flutter_service_worker.js
          ls -la site
          ls -la site/pr30-preview | head

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
