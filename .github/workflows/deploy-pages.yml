name: Deploy GitHub Pages

# SINGLE authoritative GitHub Pages deployment.
# Publishes one combined artifact:
#   /                         production Feed V1 (pinned product SHA)
#   /pr30-preview/            rejected PR #30 visual (pinned SHA)
#   /experience-v1/           standalone HTML experience prototype
#   /owner-journey-v1/        public owner full-journey test route
#
# Do not add a second workflow that calls actions/deploy-pages.
# Competing root-only deploys overwrite this site (see run 29182694682).

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Flutter
        run: |
          git clone --depth 1 --branch 3.44.6 https://github.com/flutter/flutter.git "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Verify Flutter
        run: |
          flutter --version
          flutter config --no-analytics
          flutter precache --web

      - name: Checkout production product tip
        uses: actions/checkout@v4
        with:
          ref: 99fec708c05c978948e4a1894caf7c2ef0135296
          path: prod

      - name: Build production root
        working-directory: prod
        run: |
          flutter pub get
          flutter build web --release --base-href /town-safe-space-mobile/ --pwa-strategy=none

      - name: Checkout PR #30 tip
        uses: actions/checkout@v4
        with:
          ref: 43f4bc17b71c377d09afd4cf01fcdc5ff923ecbd
          path: pr30

      - name: Build PR #30 preview subdirectory
        working-directory: pr30
        run: |
          flutter pub get
          flutter build web --release --base-href /town-safe-space-mobile/pr30-preview/ --pwa-strategy=none

      - name: Checkout experience prototype tip
        uses: actions/checkout@v4
        with:
          ref: ace5062d37b5c368ebc0266b46cea6bee3cad7a9
          path: experience-src

      - name: Checkout owner full-journey tip
        uses: actions/checkout@v4
        with:
          ref: cursor/owner-full-journey-v1-a8e5
          path: owner-src

      - name: Assemble combined Pages artifact
        run: |
          set -euo pipefail
          mkdir -p site
          cp -a prod/build/web/. site/
          mkdir -p site/pr30-preview
          cp -a pr30/build/web/. site/pr30-preview/
          mkdir -p site/experience-v1
          cp -a experience-src/prototype/town-feed-experience-v1/. site/experience-v1/
          mkdir -p site/owner-journey-v1
          cp -a owner-src/prototype/owner-journey-v1/. site/owner-journey-v1/
          rm -f site/flutter_service_worker.js
          rm -f site/pr30-preview/flutter_service_worker.js

          echo "===== ARTIFACT TREE (required paths) ====="
          find site -maxdepth 3 \( -name index.html -o -name styles.css -o -name app.js -o -name '*.jpg' -o -name '*.png' -o -name main.dart.js \) | sort
          echo "===== END ARTIFACT TREE ====="

          test -f site/index.html
          test -f site/main.dart.js
          test -f site/pr30-preview/index.html
          test -f site/pr30-preview/main.dart.js
          test -f site/experience-v1/index.html
          test -f site/experience-v1/styles.css
          test -f site/experience-v1/app.js
          test -f site/experience-v1/assets/signal_citta_studi_pavement.jpg
          test -f site/experience-v1/assets/signal_porta_romana_lighting.jpg
          test -f site/experience-v1/assets/signal_lorenteggio_works.jpg
          test -f site/owner-journey-v1/index.html
          test -f site/owner-journey-v1/styles.css
          test -f site/owner-journey-v1/app.js
          test -f site/owner-journey-v1/assets/welcome_screen.png
          grep -q 'href="/town-safe-space-mobile/"' site/index.html
          grep -q 'href="/town-safe-space-mobile/pr30-preview/"' site/pr30-preview/index.html
          grep -q 'TOWN_EXPERIENCE_PROTOTYPE_V1' site/experience-v1/index.html
          grep -q 'TOWN_OWNER_FULL_JOURNEY_V1' site/owner-journey-v1/index.html
          test ! -f site/flutter_service_worker.js
          test ! -f site/pr30-preview/flutter_service_worker.js
          echo "ARTIFACT_VALIDATION=pass"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
