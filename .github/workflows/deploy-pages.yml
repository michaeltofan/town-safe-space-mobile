name: Deploy GitHub Pages

# SINGLE authoritative GitHub Pages deployment.
# Publishes one combined artifact:
#   /                         production Feed V1 (pinned product SHA)
#   /pr30-preview/            rejected PR #30 visual (pinned SHA)
#   /pr33-preview/            temporary PR #33 rebuilt-feed preview (pinned SHA)
#   /experience-v1/           standalone HTML experience prototype
#   /owner-journey-v1/        owner verification Flutter journey (PR #35 pin)
#   /membership-entry-v1-review/ temporary Membership Entry v1 review (pinned SHA)
#   /account-setup-introduction-v1-review/ temporary Account Setup Introduction v1 review (pinned SHA)
#
# Do not add a second workflow that calls actions/deploy-pages.
# Competing root-only deploys overwrite this site (see run 29182694682).

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Flutter
        run: |
          git clone --depth 1 --branch 3.44.6 https://github.com/flutter/flutter.git "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Verify Flutter
        run: |
          flutter --version
          flutter config --no-analytics
          flutter precache --web

      - name: Checkout production product tip
        uses: actions/checkout@v4
        with:
          ref: 55e4046170ef3937c415cb97b82dc703c84d8f50
          path: prod

      - name: Build production root
        working-directory: prod
        run: |
          flutter pub get
          flutter build web --release --base-href /town-safe-space-mobile/ --pwa-strategy=none

      - name: Checkout PR #30 tip
        uses: actions/checkout@v4
        with:
          ref: 43f4bc17b71c377d09afd4cf01fcdc5ff923ecbd
          path: pr30

      - name: Build PR #30 preview subdirectory
        working-directory: pr30
        run: |
          flutter pub get
          flutter build web --release --base-href /town-safe-space-mobile/pr30-preview/ --pwa-strategy=none

      - name: Checkout PR #33 tip
        uses: actions/checkout@v4
        with:
          ref: 0c98577e4e366391786b716499e4bec7396cb630
          path: pr33

      - name: Build PR #33 preview subdirectory
        working-directory: pr33
        run: |
          flutter pub get
          flutter build web --release --base-href /town-safe-space-mobile/pr33-preview/ --pwa-strategy=none

      - name: Checkout experience prototype tip
        uses: actions/checkout@v4
        with:
          ref: ace5062d37b5c368ebc0266b46cea6bee3cad7a9
          path: experience-src

      - name: Checkout PR #35 owner-verification tip
        uses: actions/checkout@v4
        with:
          ref: dfa3a223861af152a040ac907e7df9bf554aa3ca
          path: owner-src

      - name: Build owner-journey-v1 Flutter subdirectory
        working-directory: owner-src
        run: |
          flutter pub get
          flutter build web --release --base-href /town-safe-space-mobile/owner-journey-v1/ --pwa-strategy=none

      - name: Checkout Membership Entry v1 review tip
        uses: actions/checkout@v4
        with:
          ref: 7a4e9db574e5ce25cd5c8660de1a4b0bc337ff89
          path: membership-entry-src

      - name: Build membership-entry-v1-review Flutter subdirectory
        working-directory: membership-entry-src
        run: |
          flutter pub get
          flutter build web --release --base-href /town-safe-space-mobile/membership-entry-v1-review/ --pwa-strategy=none

      - name: Checkout Account Setup Introduction v1 review tip
        uses: actions/checkout@v4
        with:
          ref: f6b0b1573a59a587a6b2a593c10cacd6ed0d870a
          path: account-setup-intro-src

      - name: Build account-setup-introduction-v1-review Flutter subdirectory
        working-directory: account-setup-intro-src
        run: |
          flutter pub get
          flutter build web --release --base-href /town-safe-space-mobile/account-setup-introduction-v1-review/ --pwa-strategy=none

      - name: Assemble combined Pages artifact
        run: |
          set -euo pipefail
          mkdir -p site
          cp -a prod/build/web/. site/
          mkdir -p site/pr30-preview
          cp -a pr30/build/web/. site/pr30-preview/
          mkdir -p site/pr33-preview
          cp -a pr33/build/web/. site/pr33-preview/
          mkdir -p site/experience-v1
          cp -a experience-src/prototype/town-feed-experience-v1/. site/experience-v1/
          mkdir -p site/owner-journey-v1
          cp -a owner-src/build/web/. site/owner-journey-v1/
          mkdir -p site/membership-entry-v1-review
          cp -a membership-entry-src/build/web/. site/membership-entry-v1-review/
          mkdir -p site/account-setup-introduction-v1-review
          cp -a account-setup-intro-src/build/web/. site/account-setup-introduction-v1-review/
          rm -f site/flutter_service_worker.js
          rm -f site/pr30-preview/flutter_service_worker.js
          rm -f site/pr33-preview/flutter_service_worker.js
          rm -f site/owner-journey-v1/flutter_service_worker.js
          rm -f site/membership-entry-v1-review/flutter_service_worker.js
          rm -f site/account-setup-introduction-v1-review/flutter_service_worker.js

          echo "===== ARTIFACT TREE (required paths) ====="
          find site -maxdepth 3 \( -name index.html -o -name styles.css -o -name app.js -o -name '*.jpg' -o -name '*.png' -o -name main.dart.js \) | sort
          echo "===== END ARTIFACT TREE ====="

          test -f site/index.html
          test -f site/main.dart.js
          test -f site/pr30-preview/index.html
          test -f site/pr30-preview/main.dart.js
          test -f site/pr33-preview/index.html
          test -f site/pr33-preview/main.dart.js
          test -f site/experience-v1/index.html
          test -f site/experience-v1/styles.css
          test -f site/experience-v1/app.js
          test -f site/experience-v1/assets/signal_citta_studi_pavement.jpg
          test -f site/experience-v1/assets/signal_porta_romana_lighting.jpg
          test -f site/experience-v1/assets/signal_lorenteggio_works.jpg
          test -f site/owner-journey-v1/index.html
          test -f site/owner-journey-v1/main.dart.js
          test -f site/membership-entry-v1-review/index.html
          test -f site/membership-entry-v1-review/main.dart.js
          test -f site/account-setup-introduction-v1-review/index.html
          test -f site/account-setup-introduction-v1-review/main.dart.js
          grep -q 'href="/town-safe-space-mobile/"' site/index.html
          grep -q 'href="/town-safe-space-mobile/pr30-preview/"' site/pr30-preview/index.html
          grep -q 'href="/town-safe-space-mobile/pr33-preview/"' site/pr33-preview/index.html
          grep -q 'TOWN_EXPERIENCE_PROTOTYPE_V1' site/experience-v1/index.html
          grep -q 'href="/town-safe-space-mobile/owner-journey-v1/"' site/owner-journey-v1/index.html
          grep -q 'href="/town-safe-space-mobile/membership-entry-v1-review/"' site/membership-entry-v1-review/index.html
          grep -q 'href="/town-safe-space-mobile/account-setup-introduction-v1-review/"' site/account-setup-introduction-v1-review/index.html
          test ! -f site/flutter_service_worker.js
          test ! -f site/pr30-preview/flutter_service_worker.js
          test ! -f site/pr33-preview/flutter_service_worker.js
          test ! -f site/owner-journey-v1/flutter_service_worker.js
          test ! -f site/membership-entry-v1-review/flutter_service_worker.js
          test ! -f site/account-setup-introduction-v1-review/flutter_service_worker.js
          echo "ARTIFACT_VALIDATION=pass"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
